<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RAFI | Business Intelligence</title>
    <style>
      body, html { 
        margin: 0; 
        padding: 0; 
        background: white; 
        color: black; 
        font-family: -apple-system, system-ui, sans-serif;
      }
      #root { 
        min-height: 100vh; 
      }
      .boot-loader { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        height: 100vh;
      }
      .spinner { 
        width: 30px; 
        height: 30px; 
        border: 3px solid #f3f3f3; 
        border-top: 3px solid #4338ca; 
        border-radius: 50%; 
        animation: spin 1s linear infinite; 
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
      // FORCED RESET SCRIPT
      (function() {
        if (location.search.includes('reset=true')) {
          localStorage.clear();
          sessionStorage.clear();
          console.log('Storage cleared via force reset flag');
        }
      })();

      // POLYFILLS/SHIMS for restricted environments
      window.global = window;
      
      // Prevent libraries from overriding fetch if it exists
      const originalFetch = window.fetch;
      if (originalFetch) {
        Object.defineProperty(window, 'fetch', {
          configurable: false,
          enumerable: true,
          get: () => originalFetch,
          set: (v) => { console.warn('Something tried to override fetch:', v); }
        });
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 14px; color: #4338ca; font-weight: bold;">Initializing RAFI...</p>
        <p style="margin-top: 5px; font-size: 11px; color: #999;">If this takes more than 10 seconds, try a reset below.</p>
        <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 220px;">
          <button onclick="location.reload(true);" style="padding: 12px; border-radius: 10px; border: 1px solid #4338ca; background: #4338ca; color: white; cursor: pointer; font-weight: bold;">Refresh Page</button>
          <button onclick="localStorage.clear(); sessionStorage.clear(); location.href='/'" style="padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white; color: #666; cursor: pointer; font-size: 12px;">Hard Force Reset</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
