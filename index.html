<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini ERP Store Manager</title>
    <script>
      // Nuclear Reset Script
      async function nuclearReset() {
        console.log('Nuclear reset initiated...');
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for(let r of regs) await r.unregister();
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          for(let k of keys) await caches.delete(k);
        }
        localStorage.clear();
        sessionStorage.clear();
        if (window.indexedDB && window.indexedDB.databases) {
          const dbs = await window.indexedDB.databases();
          for(let db of dbs) if(db.name) window.indexedDB.deleteDatabase(db.name);
        }
        window.location.href = window.location.origin + window.location.pathname + '?v=' + Date.now();
      }

      if (window.location.search.includes('reset=true')) {
        nuclearReset();
      }
    </script>
    <style>
      #loading-screen {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        font-family: sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #4f46e5;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen">
        <div style="text-align: center;">
          <div class="spinner" style="margin: 0 auto 20px;"></div>
          <h2 style="margin: 0; color: #111827;">Loading Mini ERP...</h2>
          <p style="color: #6b7280; margin-top: 8px;">Please wait while the system starts.</p>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
